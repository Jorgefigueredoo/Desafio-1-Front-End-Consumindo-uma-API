<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle shine -->
  <ellipse cx="200" cy="140" rx="160" ry="80" fill="white" opacity="0.1"/>

  <!-- Magnifying glass group -->
  <g filter="url(#shadow)">
    <!-- Glass handle -->
    <line x1="340" y1="340" x2="420" y2="420" stroke="#1e3a5f" stroke-width="36" stroke-linecap="round"/>
    <line x1="340" y1="340" x2="420" y2="420" stroke="#334155" stroke-width="28" stroke-linecap="round"/>

    <!-- Glass circle outer -->
    <circle cx="240" cy="240" r="130" fill="none" stroke="#e2e8f0" stroke-width="24"/>
    <circle cx="240" cy="240" r="130" fill="none" stroke="white" stroke-width="18"/>

    <!-- Glass fill -->
    <circle cx="240" cy="240" r="118" fill="url(#lens)"/>
  </g>

  <!-- Location pin inside glass -->
  <g transform="translate(240, 200)">
    <path d="M0-50 C-28-50 -50-28 -50,0 C-50,22 -10,58 0,72 C10,58 50,22 50,0 C50-28 28-50 0-50Z" fill="url(#pin)" stroke="#d97706" stroke-width="3"/>
    <circle cx="0" cy="-2" r="16" fill="white"/>
  </g>

  <!-- CEP text label -->
  <rect x="148" y="296" width="184" height="44" rx="10" fill="white" opacity="0.95"/>
  <rect x="148" y="296" width="184" height="44" rx="10" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="240" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#1e3a5f" letter-spacing="2">CEP</text>
</svg>
