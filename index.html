<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de CEP | Consulta rápida pelo ViaCEP</title>
    <meta
      name="description"
      content="Consulte CEPs de forma rápida e simples usando a API ViaCEP. Veja rua, bairro, cidade e estado em segundos."
    />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <img
        class="banner"
        src="https://i.ytimg.com/vi/RQkthiy0oMM/hqdefault.jpg"
        alt="Imagem ilustrativa de consulta de CEP"
        width="350"
        height="197"
      />

      <h1>Busque o seu CEP</h1>
      <p class="descricao">
        Digite um CEP com 8 dígitos para consultar o endereço ou use sua localização atual.
      </p>

      <form class="form-busca" id="cepForm">
        <label for="cep">CEP</label>
        <input
          type="text"
          id="cep"
          name="cep"
          inputmode="numeric"
          autocomplete="postal-code"
          maxlength="9"
          placeholder="Ex: 50000-000"
          aria-describedby="ajuda-cep"
        />
        <small id="ajuda-cep">
          Digite apenas números ou no formato 00000-000.
        </small>

        <div class="acoes">
          <button type="submit">Buscar CEP</button>
          <button type="button" id="geoBtn">Usar minha localização</button>
        </div>
      </form>

      <button type="button" id="installBtn" hidden>Instalar aplicativo</button>

      <section
        id="resultado"
        class="resultado"
        aria-live="polite"
        aria-atomic="true"
      ></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
